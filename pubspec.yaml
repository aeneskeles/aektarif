name: tarifuyg
description: "Malzemelere göre tarif öneren ve yemek paylaşım uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Backend
  supabase_flutter: ^2.0.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

  # ML / Inference
  tflite_flutter: ^0.11.0
  http: ^1.2.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.3
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/recipe_data.json
    - assets/models/
    - assets/models/labels.txt
    - assets/models/ingredient_model.tflite
    - assets/images/
